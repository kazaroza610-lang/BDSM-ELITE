<script>
function showPage(pageId) {
    // Masquer TOUTES les sections
    document.querySelectorAll('.page-section').forEach(section => {
        section.style.display = 'none';
        section.classList.remove('active');
    });

    // Afficher UNIQUEMENT la page demandée
    if (pageId === 'index') {
        const indexPage = document.getElementById('page-index');
        if (indexPage) {
            indexPage.style.display = 'block';
            indexPage.classList.add('active');
        }
    } else {
        // Chercher d'abord avec le préfixe "page-"
        let element = document.getElementById('page-' + pageId);
        // Si pas trouvé, chercher avec le préfixe "fiche-"
        if (!element) {
            element = document.getElementById('fiche-' + pageId);
        }

        if (element) {
            element.style.display = 'block';
            element.classList.add('active');
        }
    }

    window.location.hash = pageId;
}

function ajouterAuPanier(productName) {
    alert(`✓ "${productName}" a été ajouté au panier!`);
}

// Au chargement initial, afficher la page d'accueil
window.addEventListener('load', () => {
    const hash = window.location.hash.slice(1) || 'index';
    showPage(hash);
});

// Quand le hash change, afficher la page correspondante
window.addEventListener('hashchange', () => {
    const hash = window.location.hash.slice(1) || 'index';
    showPage(hash);
});

// Slideshow automatique
let currentSlide = 0;
function updateSlide() {
    const slides = document.querySelectorAll('.slide');
    slides.forEach(s => s.classList.remove('active'));
    if (slides[currentSlide]) slides[currentSlide].classList.add('active');
}

window.addEventListener('load', () => {
    const slides = document.querySelectorAll('.slide');
    if (slides.length > 0) {
        setInterval(() => {
            currentSlide = (currentSlide + 1) % slides.length;
            updateSlide();
        }, 5000);
    }
});

// Gestion des variantes de couleur
function selectVariant(productId, variantType, variantValue) {
    if (variantType === 'couleur') {
        // Masquer tous les boutons de couleur comme actifs
        document.querySelectorAll(`[data-product="${productId}"][data-variant="couleur"]`).forEach(btn => {
            btn.style.borderColor = '#ccc';
            btn.style.color = '#000';
        });
        
        // Activer le bouton cliqué
        event.target.style.borderColor = '#dc143c';
        event.target.style.color = '#dc143c';
        
        console.log(`Variante sélectionnée: ${variantType} = ${variantValue}`);
    }
}


// Changer l'image quand on clique sur une variante
function changeVariantImage(productId, imageUrl) {
    const img = document.getElementById('main-image-' + productId);
    if (img) {
        img.src = imageUrl;
    }
}

// Gestion des variantes avec bordure rouge mobile

function increaseQuantity(elementId) {
    const input = document.querySelector('#' + elementId + ' input[type="number"]');
    if (input) input.value = parseInt(input.value) + 1;
}

function decreaseQuantity(elementId) {
    const input = document.querySelector('#' + elementId + ' input[type="number"]');
    if (input && parseInt(input.value) > 1) input.value = parseInt(input.value) - 1;
}

function selectVariantImage(productId, imageUrl, variantId, buttonId) {
    // Changer l'image principale
    const mainImg = document.getElementById('main-image-' + productId);
    if (mainImg) {
        mainImg.src = 'https://bdsm-empire.fr/cdn/shop/products/' + imageUrl;
    }

    // Retirer la classe sélectionnée de TOUS les variants (images)
    const allVariants = document.querySelectorAll('img[id*="variant-"]');
    allVariants.forEach(img => {
        img.classList.remove('variant-selected');
        img.classList.add('variant-unselected');
    });

    // Ajouter la classe sélectionnée au variant cliqué (image)
    const selectedVariant = document.getElementById(variantId);
    if (selectedVariant) {
        selectedVariant.classList.remove('variant-unselected');
        selectedVariant.classList.add('variant-selected');
    }

    // Gérer les boutons de couleur aussi
    if (buttonId) {
        const allButtons = document.querySelectorAll('button.btn-variant');
        allButtons.forEach(btn => {
            btn.classList.remove('variant-selected');
            btn.classList.add('variant-unselected');
        });
        const selectedButton = document.getElementById(buttonId);
        if (selectedButton) {
            selectedButton.classList.remove('variant-unselected');
            selectedButton.classList.add('variant-selected');
        }
    }
}

</script>
